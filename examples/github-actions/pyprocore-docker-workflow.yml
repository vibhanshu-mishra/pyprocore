name: PyProcore Docker Workflow

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "examples/docker/**"
      - "examples/github-actions/pyprocore-docker-workflow.yml"
      - "pyprocore/**"
      - "pyproject.toml"

jobs:
  docker-dry-run:
    runs-on: ubuntu-latest

    env:
      WORKFLOW_PLAN_PATH: examples/workflow_plans/lightweight_sync.json
      WORKFLOW_OUTPUT_DIR: exports/docker-ci-dry-run

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pyprocore:ci .

      - name: Check CLI help
        run: docker run --rm pyprocore:ci procore-sdk --help

      - name: Validate sample workflow plan
        run: docker run --rm pyprocore:ci procore-sdk workflow-plan validate "$WORKFLOW_PLAN_PATH"

      - name: Dry-run sample workflow plan
        run: |
          mkdir -p "$WORKFLOW_OUTPUT_DIR"
          docker run --rm \
            -v "$PWD/exports:/app/exports" \
            pyprocore:ci \
            procore-sdk workflow-plan run "$WORKFLOW_PLAN_PATH" --output-dir "$WORKFLOW_OUTPUT_DIR" --dry-run

      - name: Upload dry-run output
        uses: actions/upload-artifact@v4
        with:
          name: pyprocore-docker-dry-run-output
          path: ${{ env.WORKFLOW_OUTPUT_DIR }}
          if-no-files-found: warn
